<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050810" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="D7" />
    <title>D7 — Dispatch Seven</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #050810; color: #e2e8f0; font-family: Inter, system-ui, sans-serif; }
      #root { min-height: 100vh; min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="fallback" style="position:fixed;inset:0;background:#050810;color:#e2e8f0;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:-1">
      <div style="font-size:24px;color:#1d4ed8;letter-spacing:.2em">D7</div>
      <div style="font-size:11px;color:#4a5568;letter-spacing:.15em">LOADING...</div>
    </div>
    <script>
      // Hide fallback once React mounts
      window.__d7_hide_fallback = function() {
        var f = document.getElementById('fallback');
        if (f) f.style.display = 'none';
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Unregister any old service workers to prevent stale cache issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
      }
    </script>
  </body>
</html>
