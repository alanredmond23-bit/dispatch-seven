name: Agent Eval CI
on:
  pull_request:
    paths:
      - 'agents/**'
      - 'promptfoo.config.yaml'
      - 'evals/**'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install promptfoo
      - name: Run orchestrator evals
        run: npx promptfoo eval --config evals/orchestrator.yaml --no-cache
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run legal agent evals
        run: npx promptfoo eval --config evals/legal.yaml --no-cache
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Run build agent evals
        run: npx promptfoo eval --config evals/build.yaml --no-cache
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
