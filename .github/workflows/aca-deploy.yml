name: Deploy to ACA
on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/aca-deploy.yml']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image dispatch7-backend:${{ github.sha }} \
            ./backend
      - name: Deploy to ACA
        run: |
          az containerapp update \
            --name dispatch7-backend \
            --resource-group menagerie-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/dispatch7-backend:${{ github.sha }}
