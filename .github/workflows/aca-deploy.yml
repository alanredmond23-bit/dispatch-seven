name: Deploy to ACA
on:
  push:
    branches: [main]
    paths: ['backend/**', '.github/workflows/aca-deploy.yml']
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ secrets.ACR_NAME }} \
            --image dispatch-seven-api:${{ github.sha }} \
            ./backend
      - name: Configure ACR pull auth on ACA
        run: |
          az acr update --name ${{ secrets.ACR_NAME }} --admin-enabled true
          ACR_PASSWORD=$(az acr credential show --name ${{ secrets.ACR_NAME }} --query passwords[0].value -o tsv)
          az containerapp registry set \
            --name dispatch-seven-api \
            --resource-group menagerie-rg \
            --server ${{ secrets.ACR_NAME }}.azurecr.io \
            --username ${{ secrets.ACR_NAME }} \
            --password "$ACR_PASSWORD"
      - name: Deploy to ACA
        run: |
          az containerapp update \
            --name dispatch-seven-api \
            --resource-group menagerie-rg \
            --image ${{ secrets.ACR_NAME }}.azurecr.io/dispatch-seven-api:${{ github.sha }} \
            --set-env-vars PORT=3000
